name: Tests and publication consistency

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Tests - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

  publication:
    name: Publication reproducibility
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Regenerate publication
        run: |
          python scripts/generate_report_tables.py
          python scripts/assemble_docs.py

      - name: Verify publication is reproducible
        run: |
          git diff --exit-code -- \
            README.md \
            MIRROR_ARTICLE.md \
            docs/REPORT.md \
            docs/_generated/report_results.md \
            docs/_generated/readme_block.md \
            docs/_generated/mirror_findings.md